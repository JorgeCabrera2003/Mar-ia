<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Mar-ia — Asistente de inteligencia artificial del sistema SICGOV. Consulta reportes de inventario, asistencia, reservaciones y más."/>
  <title>Mar-ia · Asistente IA — SICGOV</title>
  <link rel="icon" href="/static/favicon.ico"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/mar-ia.css"/>
</head>
<body>

<div class="app" role="main">

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="header" role="banner">
    <div class="header__logo">
      <img
        class="header__logo-img"
        src="/static/logo.png"
        alt="Good Vibes Tapas &amp; Bar"
        onerror="this.style.display='none'"
      />
      <div class="header__logo-divider" aria-hidden="true"></div>
      <span class="header__logo-label">SICGOV · IA</span>
    </div>

    <div class="header__agent">
      <div class="header__avatar" aria-hidden="true">
        <img src="/static/maria.png" alt="Avatar de Mar-ia"/>
      </div>
      <div>
        <p class="header__name">Mar-ia</p>
        <p class="header__status">
          <span class="status-dot" id="status-dot" aria-hidden="true"></span>
          <span id="status-text">Verificando…</span>
        </p>
      </div>
    </div>

    <div class="header__badge" id="model-badge" aria-live="polite">SVM · Cargando</div>
  </header>

  <!-- ── Suggestion Chips ───────────────────────────────── -->
  <nav class="chips-bar" aria-label="Consultas rápidas">
    <button class="chip" onclick="sendChip('dame el inventario bajo')">Inventario bajo</button>
    <button class="chip" onclick="sendChip('asistencia de hoy')">Asistencia hoy</button>
    <button class="chip" onclick="sendChip('reservas de hoy')">Reservas hoy</button>
    <button class="chip" onclick="sendChip('stock crítico de insumos')">Stock crítico</button>
    <button class="chip" onclick="sendChip('cuántos clientes hay registrados')">Clientes</button>
    <button class="chip" onclick="sendChip('directorio de empleados')">Empleados</button>
    <button class="chip" onclick="sendChip('pedidos pendientes')">Pedidos</button>
    <button class="chip" onclick="sendChip('reservas de ayer')">Ayer</button>
    <button class="chip" onclick="sendChip('reservas de esta semana')">Esta semana</button>
  </nav>

  <!-- ── Chat Area ──────────────────────────────────────── -->
  <section
    class="chat-area"
    id="chat-area"
    aria-label="Conversación con Mar-ia"
    aria-live="polite"
    role="log"
  >
    <!-- Welcome screen (se oculta al primer mensaje) -->
    <div class="welcome" id="welcome">
      <div class="welcome__avatar" aria-hidden="true">
        <img src="/static/maria.png" alt=""/>
      </div>
      <h1 class="welcome__title">¡Hola! Soy Mar-ia</h1>
      <p class="welcome__desc">
        Tu asistente de inteligencia artificial para <strong>SICGOV</strong>.<br/>
        Puedo consultar reportes de inventario, asistencia, reservaciones,
        clientes, empleados y pedidos — por fecha, rango o estado.
      </p>
      <div class="welcome__chips" role="list">
        <button class="welcome__chip" role="listitem" onclick="sendChip('dame el inventario bajo')">Inventario bajo</button>
        <button class="welcome__chip" role="listitem" onclick="sendChip('reservas de hoy')">Reservas de hoy</button>
        <button class="welcome__chip" role="listitem" onclick="sendChip('asistencia de hoy')">Asistencia de hoy</button>
        <button class="welcome__chip" role="listitem" onclick="sendChip('pedidos pendientes')">Pedidos pendientes</button>
      </div>
    </div>
  </section>

  <!-- ── Input Bar ──────────────────────────────────────── -->
  <div class="input-bar" role="form" aria-label="Enviar consulta a Mar-ia">
    <label for="cedula-input" class="u-sr-only">Cédula del usuario</label>
    <input
      class="input-bar__cedula"
      id="cedula-input"
      type="text"
      placeholder="Cédula"
      value="V-12345678"
      autocomplete="off"
    />
    <label for="msg-input" class="u-sr-only">Escribe tu consulta</label>
    <textarea
      class="input-bar__text"
      id="msg-input"
      placeholder="Escribe tu consulta… ej: las reservas del 1 de julio"
      rows="1"
      aria-label="Mensaje"
    ></textarea>
    <button
      class="input-bar__send"
      id="send-btn"
      onclick="sendMessage()"
      aria-label="Enviar mensaje"
      title="Enviar (Enter)"
    >➤</button>
  </div>

  <!-- ── Status Bar ─────────────────────────────────────── -->
  <footer class="status-bar" role="status" aria-label="Estado del servicio">
    <span class="status-bar__item">
      <span class="status-bar__dot status-bar__dot--green" id="dot-api"></span>
      API Mar-ia
    </span>
    <span class="status-bar__item">
      <span class="status-bar__dot status-bar__dot--green" id="dot-model"></span>
      Modelo SVM
    </span>
    <span class="status-bar__item">
      <span class="status-bar__dot status-bar__dot--green" id="dot-db"></span>
      Base de datos
    </span>
    <span class="status-bar__item" id="version-label"></span>
  </footer>

</div><!-- /.app -->

<script>
'use strict';

/* ── Config ──────────────────────────────────────────────── */
const API_URL = 'http://localhost:8090';
let isLoading = false;
let typingCounter = 0;

/* ── Auto-resize textarea ────────────────────────────────── */
const msgInput = document.getElementById('msg-input');

msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
});

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

/* ── Health check ────────────────────────────────────────── */
async function checkHealth() {
  try {
    const res  = await fetch(`${API_URL}/health`);
    const data = await res.json();

    document.getElementById('status-dot').style.background = 'var(--color-online)';
    document.getElementById('status-text').textContent = 'En línea';
    document.getElementById('model-badge').textContent  = `SVM · ${data.intenciones.length} intenciones`;

    setDot('dot-api',   'green');
    setDot('dot-model', data.modelo_listo ? 'green' : 'yellow');
    setDot('dot-db',    data.bd_conectada  ? 'green' : 'red');
    document.getElementById('version-label').textContent = `v${data.version}`;
  } catch {
    document.getElementById('status-dot').style.background = 'var(--color-offline)';
    document.getElementById('status-text').textContent = 'Sin conexión';
    setDot('dot-api', 'red');
  }
}

function setDot(id, color) {
  const el = document.getElementById(id);
  el.className = `status-bar__dot status-bar__dot--${color}`;
}

/* ── Send via chip ───────────────────────────────────────── */
function sendChip(text) {
  msgInput.value = text;
  sendMessage();
}

/* ── Send message ────────────────────────────────────────── */
async function sendMessage() {
  if (isLoading) return;

  const cedula  = document.getElementById('cedula-input').value.trim() || 'V-00000000';
  const mensaje = msgInput.value.trim();
  if (!mensaje) return;

  hideWelcome();
  appendUserBubble(mensaje);
  msgInput.value = '';
  msgInput.style.height = 'auto';

  const typingId = appendTyping();
  setLoading(true);

  try {
    const res  = await fetch(`${API_URL}/classify`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ cedula, mensaje }),
    });
    const data = await res.json();
    removeTyping(typingId);
    appendMariaBubble(data);
  } catch {
    removeTyping(typingId);
    appendErrorBubble('No pude conectarme con el servidor Mar-ia (puerto 8090).');
  } finally {
    setLoading(false);
  }
}

/* ── DOM Builders ────────────────────────────────────────── */

function hideWelcome() {
  document.getElementById('welcome')?.remove();
}

function appendUserBubble(text) {
  chatArea().insertAdjacentHTML('beforeend', `
    <div class="msg msg--user">
      <div class="msg__avatar msg__avatar--user" aria-hidden="true">Yo</div>
      <div class="bubble bubble--user">
        ${escHtml(text)}
        <div class="bubble__time">${timestamp()}</div>
      </div>
    </div>`);
  scrollToBottom();
}

function appendMariaBubble(data) {
  let inner = '';

  if (data.error) {
    inner = `
      <div class="intent-badge intent-badge--warn">No reconocida</div>
      <p>${escHtml(data.error)}</p>`;
  } else {
    const conf   = Math.round((data.confianza || 0) * 100);
    const cls    = conf >= 75 ? 'ok' : 'warn';
    const titulo = data.metadata?.titulo || data.intencion || '—';

    inner = `<div class="intent-badge intent-badge--${cls}">${escHtml(titulo)}</div>`;

    inner += `
      <div class="confidence">
        <div class="confidence__label">Confianza: <strong>${conf}%</strong></div>
        <div class="confidence__track">
          <div class="confidence__fill" style="width:${conf}%"></div>
        </div>
      </div>`;

    const cols = data.documento_config?.columnas || [];
    const rows = data.documento_config?.filas    || [];

    if (cols.length) {
      inner += '<div class="data-table-wrap"><table class="data-table"><thead><tr>';
      cols.forEach(c => { inner += `<th>${escHtml(c)}</th>`; });
      inner += '</tr></thead><tbody>';

      if (rows.length) {
        rows.forEach(row => {
          inner += '<tr>';
          row.forEach(cell => { inner += `<td>${escHtml(String(cell))}</td>`; });
          inner += '</tr>';
        });
      } else {
        inner += `<tr><td colspan="${cols.length}" class="data-table__empty">Sin registros para este período.</td></tr>`;
      }
      inner += '</tbody></table></div>';
    }

    if (data.metadata?.periodo) {
      inner += `
        <div class="report-footer">
          <strong>${escHtml(data.metadata.periodo)}</strong>
          &nbsp;·&nbsp; ${escHtml(data.metadata.hora)}
          &nbsp;·&nbsp; ${data.metadata.total_filas} registros
        </div>`;
    }
  }

  chatArea().insertAdjacentHTML('beforeend', `
    <div class="msg msg--maria">
      <div class="msg__avatar" aria-hidden="true">
        <img src="/static/maria.png" alt="Mar-ia"/>
      </div>
      <div class="bubble bubble--maria">
        ${inner}
        <div class="bubble__time">${timestamp()}</div>
      </div>
    </div>`);
  scrollToBottom();
}

function appendErrorBubble(text) {
  chatArea().insertAdjacentHTML('beforeend', `
    <div class="msg msg--maria">
      <div class="msg__avatar" aria-hidden="true">
        <img src="/static/maria.png" alt="Mar-ia"/>
      </div>
      <div class="bubble bubble--maria">
        <div class="intent-badge intent-badge--error">Error de conexión</div>
        <p>${escHtml(text)}</p>
      </div>
    </div>`);
  scrollToBottom();
}

function appendTyping() {
  const id = `typing-${++typingCounter}`;
  chatArea().insertAdjacentHTML('beforeend', `
    <div class="msg msg--maria" id="${id}" aria-label="Mar-ia está escribiendo">
      <div class="msg__avatar" aria-hidden="true">
        <img src="/static/maria.png" alt=""/>
      </div>
      <div class="bubble bubble--maria">
        <div class="typing">
          <span class="typing__dot"></span>
          <span class="typing__dot"></span>
          <span class="typing__dot"></span>
        </div>
      </div>
    </div>`);
  scrollToBottom();
  return id;
}

function removeTyping(id) {
  document.getElementById(id)?.remove();
}

/* ── Helpers ─────────────────────────────────────────────── */

function setLoading(val) {
  isLoading = val;
  document.getElementById('send-btn').disabled = val;
}

function chatArea() {
  return document.getElementById('chat-area');
}

function scrollToBottom() {
  const area = chatArea();
  area.scrollTop = area.scrollHeight;
}

function timestamp() {
  return new Date().toLocaleTimeString('es-VE', { hour: '2-digit', minute: '2-digit' });
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ── Init ────────────────────────────────────────────────── */
checkHealth();
setInterval(checkHealth, 30_000);
</script>
</body>
</html>
