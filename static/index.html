<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mar-ia · Agente IA SICGOV</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0a0e1a;
      --surface:     #111827;
      --surface2:    #1a2235;
      --border:      rgba(255,255,255,0.07);
      --accent:      #6366f1;
      --accent2:     #818cf8;
      --accent-glow: rgba(99,102,241,0.25);
      --user-bg:     linear-gradient(135deg,#6366f1,#8b5cf6);
      --maria-bg:    #1e293b;
      --text:        #e2e8f0;
      --muted:       #64748b;
      --success:     #10b981;
      --warning:     #f59e0b;
      --error:       #ef4444;
      --radius:      14px;
    }

    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

    /* ── Layout ─────────────────────────────────────── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, var(--accent-glow) 0%, transparent 60%);
      pointer-events: none;
    }
    .avatar {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 0 20px var(--accent-glow);
      animation: pulse-avatar 3s ease-in-out infinite;
    }
    @keyframes pulse-avatar {
      0%,100% { box-shadow: 0 0 18px var(--accent-glow); }
      50%      { box-shadow: 0 0 32px rgba(99,102,241,0.5); }
    }
    .header-info h1 { font-size: 18px; font-weight: 700; color: #fff; }
    .header-info p  { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--success);
      display: inline-block; margin-right: 5px;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .header-badge {
      margin-left: auto;
      font-size: 11px;
      color: var(--accent2);
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.3);
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    /* ── Suggestions bar ─────────────────────────────── */
    .suggestions {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .suggestions::-webkit-scrollbar { display:none; }
    .chip {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--accent2);
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s;
      font-family: inherit;
    }
    .chip:hover {
      background: rgba(99,102,241,0.15);
      border-color: var(--accent);
      color: #fff;
      transform: translateY(-1px);
    }

    /* ── Chat area ───────────────────────────────────── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scrollbar-width: thin;
      scrollbar-color: var(--surface2) transparent;
    }
    .chat-area::-webkit-scrollbar { width: 6px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

    /* ── Messages ────────────────────────────────────── */
    .msg { display: flex; align-items: flex-end; gap: 10px; animation: slide-in .3s ease; }
    @keyframes slide-in { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }

    .msg.user  { flex-direction: row-reverse; }
    .msg.maria { flex-direction: row; }

    .msg-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .msg.user .msg-avatar {
      background: linear-gradient(135deg, #334155, #475569);
    }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: 14px;
      position: relative;
    }
    .msg.user  .bubble { background: var(--user-bg); color: #fff; border-bottom-right-radius: 4px; }
    .msg.maria .bubble { background: var(--maria-bg); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }

    .bubble-meta {
      font-size: 10.5px;
      color: rgba(255,255,255,0.45);
      margin-top: 5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .msg.maria .bubble-meta { color: var(--muted); }

    /* ── Intent badge ────────────────────────────────── */
    .intent-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      margin-bottom: 8px;
    }
    .intent-badge.ok      { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
    .intent-badge.warn    { background: rgba(245,158,11,0.15);  color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
    .intent-badge.error   { background: rgba(239,68,68,0.15);   color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

    /* ── Data table ──────────────────────────────────── */
    .data-table-wrap {
      margin-top: 10px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .data-table th {
      background: rgba(99,102,241,0.15);
      color: var(--accent2);
      padding: 8px 10px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
    }
    .data-table td {
      padding: 7px 10px;
      border-top: 1px solid var(--border);
      color: var(--text);
    }
    .data-table tr:hover td { background: rgba(255,255,255,0.03); }

    .no-data {
      text-align: center;
      color: var(--muted);
      padding: 14px;
      font-size: 13px;
    }

    /* ── Confidence bar ──────────────────────────────── */
    .conf-wrap { margin-top: 8px; }
    .conf-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .conf-bar-bg {
      height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
    }
    .conf-bar-fill {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      transition: width .6s ease;
    }

    /* ── Typing indicator ────────────────────────────── */
    .typing { display: flex; align-items: center; gap: 5px; padding: 14px 16px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent2);
      animation: bounce .9s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

    /* ── Welcome ─────────────────────────────────────── */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .welcome .icon { font-size: 48px; margin-bottom: 12px; }
    .welcome h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
    .welcome p  { font-size: 13px; line-height: 1.6; }

    /* ── Input bar ───────────────────────────────────── */
    .input-bar {
      padding: 16px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .cedula-field {
      width: 130px;
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
      flex-shrink: 0;
    }
    .cedula-field:focus { border-color: var(--accent); }

    .msg-input {
      flex: 1;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      transition: border-color .2s;
      line-height: 1.4;
    }
    .msg-input::placeholder { color: var(--muted); }
    .msg-input:focus { border-color: var(--accent); }

    .send-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      transition: transform .15s, box-shadow .15s, opacity .15s;
      box-shadow: 0 4px 14px rgba(99,102,241,0.4);
    }
    .send-btn:hover:not(:disabled) { transform: scale(1.07); box-shadow: 0 6px 20px rgba(99,102,241,0.55); }
    .send-btn:active:not(:disabled) { transform: scale(0.95); }
    .send-btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Status footer ───────────────────────────────── */
    .footer-status {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 8px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
    }
    .footer-status span { display: flex; align-items: center; gap: 4px; }
    .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .dot.green  { background: var(--success); }
    .dot.red    { background: var(--error); }
    .dot.yellow { background: var(--warning); }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="avatar">🤖</div>
    <div class="header-info">
      <h1>Mar-ia</h1>
      <p><span class="status-dot" id="status-dot"></span><span id="status-text">Verificando conexión…</span></p>
    </div>
    <div class="header-badge" id="model-badge">Modelo cargando…</div>
  </header>

  <!-- Suggestion chips -->
  <div class="suggestions">
    <button class="chip" onclick="sendChip('dame el inventario bajo')">📦 Inventario bajo</button>
    <button class="chip" onclick="sendChip('asistencia del personal hoy')">📋 Asistencia de hoy</button>
    <button class="chip" onclick="sendChip('ver las reservaciones de hoy')">📅 Reservas de hoy</button>
    <button class="chip" onclick="sendChip('stock crítico de insumos')">⚠️ Stock crítico</button>
    <button class="chip" onclick="sendChip('quiénes faltaron hoy')">👥 Ausentes hoy</button>
    <button class="chip" onclick="sendChip('cuántas mesas reservadas')">🍽️ Mesas reservadas</button>
  </div>

  <!-- Chat area -->
  <div class="chat-area" id="chat-area">
    <div class="welcome" id="welcome">
      <div class="icon">🤖</div>
      <h2>¡Hola! Soy Mar-ia</h2>
      <p>Tu agente de inteligencia artificial para SICGOV.<br/>
         Puedo generar reportes de <strong>inventario</strong>, <strong>asistencia</strong> y <strong>reservaciones</strong>.<br/>
         Escríbeme lo que necesitas o usa una sugerencia de arriba.</p>
    </div>
  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <input class="cedula-field" id="cedula-input" type="text" placeholder="Cédula" value="V-12345678" />
    <textarea class="msg-input" id="msg-input" placeholder="Escribe tu consulta… (Ej: dame el inventario bajo)" rows="1"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Enviar">➤</button>
  </div>

  <!-- Footer status -->
  <div class="footer-status">
    <span><span class="dot" id="dot-api"></span> API Mar-ia</span>
    <span><span class="dot" id="dot-model"></span> Modelo SVM</span>
    <span><span class="dot" id="dot-db"></span> Base de datos</span>
    <span id="version-label"></span>
  </div>

</div>

<script>
  const API = 'http://localhost:8090';
  let isLoading = false;

  // ── Auto-resize textarea ──────────────────────────────
  const msgInput = document.getElementById('msg-input');
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  });
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── Health check on load ──────────────────────────────
  async function checkHealth() {
    try {
      const res = await fetch(`${API}/health`);
      const data = await res.json();

      document.getElementById('status-dot').style.background = '#10b981';
      document.getElementById('status-text').textContent = 'En línea';
      document.getElementById('model-badge').textContent =
        `SVM · ${data.intenciones.length} intenciones`;

      setDot('dot-api',   'green');
      setDot('dot-model', data.modelo_listo ? 'green' : 'yellow');
      setDot('dot-db',    data.bd_conectada  ? 'green' : 'red');
      document.getElementById('version-label').textContent = `v${data.version}`;
    } catch {
      document.getElementById('status-dot').style.background = '#ef4444';
      document.getElementById('status-text').textContent = 'Sin conexión';
      setDot('dot-api', 'red');
    }
  }

  function setDot(id, color) {
    const el = document.getElementById(id);
    el.className = 'dot ' + color;
  }

  // ── Send chip ─────────────────────────────────────────
  function sendChip(text) {
    msgInput.value = text;
    sendMessage();
  }

  // ── Send message ──────────────────────────────────────
  async function sendMessage() {
    if (isLoading) return;
    const cedula  = document.getElementById('cedula-input').value.trim() || 'V-00000000';
    const mensaje = msgInput.value.trim();
    if (!mensaje) return;

    hideWelcome();
    appendUserMsg(mensaje);
    msgInput.value = '';
    msgInput.style.height = 'auto';

    const typingId = appendTyping();
    setLoading(true);

    try {
      const res = await fetch(`${API}/classify`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cedula, mensaje }),
      });
      const data = await res.json();
      removeTyping(typingId);
      appendMariaMsg(data);
    } catch (err) {
      removeTyping(typingId);
      appendErrorMsg('No pude conectarme con el servidor. ¿Está Mar-ia corriendo en el puerto 8090?');
    } finally {
      setLoading(false);
    }
  }

  // ── DOM helpers ───────────────────────────────────────
  function hideWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function appendUserMsg(text) {
    const area = document.getElementById('chat-area');
    const now  = new Date().toLocaleTimeString('es-VE', { hour:'2-digit', minute:'2-digit' });
    area.insertAdjacentHTML('beforeend', `
      <div class="msg user">
        <div class="msg-avatar">👤</div>
        <div class="bubble">
          ${escHtml(text)}
          <div class="bubble-meta">${now}</div>
        </div>
      </div>`);
    scrollBottom();
  }

  function appendMariaMsg(data) {
    const area = document.getElementById('chat-area');
    const now  = new Date().toLocaleTimeString('es-VE', { hour:'2-digit', minute:'2-digit' });

    let inner = '';

    if (data.error) {
      // Error / no entendió
      inner = `
        <div class="intent-badge warn">⚠️ No reconocida</div>
        <div>${escHtml(data.error)}</div>`;
    } else {
      // Intent badge
      const conf     = Math.round((data.confianza || 0) * 100);
      const badgeCls = conf >= 75 ? 'ok' : 'warn';
      const title    = data.metadata?.titulo || data.intencion || '—';

      inner = `
        <div class="intent-badge ${badgeCls}">✅ ${escHtml(title)}</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:6px;">
          Aquí tienes el reporte solicitado:
        </div>`;

      // Confidence bar
      inner += `
        <div class="conf-wrap">
          <div class="conf-label">Confianza: ${conf}%</div>
          <div class="conf-bar-bg">
            <div class="conf-bar-fill" style="width:${conf}%"></div>
          </div>
        </div>`;

      // Table
      const cols = data.documento_config?.columnas || [];
      const rows = data.documento_config?.filas    || [];

      if (cols.length) {
        inner += '<div class="data-table-wrap"><table class="data-table"><thead><tr>';
        cols.forEach(c => { inner += `<th>${escHtml(c)}</th>`; });
        inner += '</tr></thead><tbody>';
        if (rows.length) {
          rows.forEach(row => {
            inner += '<tr>';
            row.forEach(cell => { inner += `<td>${escHtml(String(cell))}</td>`; });
            inner += '</tr>';
          });
        } else {
          inner += `<tr><td colspan="${cols.length}" class="no-data">Sin registros para hoy.</td></tr>`;
        }
        inner += '</tbody></table></div>';
      }

      // Metadata footer
      if (data.metadata?.fecha) {
        inner += `<div class="bubble-meta" style="margin-top:10px;">
          📅 ${data.metadata.fecha} · ${data.metadata.hora} · ${data.metadata.total_filas} registros
        </div>`;
      }
    }

    area.insertAdjacentHTML('beforeend', `
      <div class="msg maria">
        <div class="msg-avatar">🤖</div>
        <div class="bubble">
          ${inner}
          <div class="bubble-meta">${now}</div>
        </div>
      </div>`);
    scrollBottom();
  }

  function appendErrorMsg(text) {
    const area = document.getElementById('chat-area');
    area.insertAdjacentHTML('beforeend', `
      <div class="msg maria">
        <div class="msg-avatar">🤖</div>
        <div class="bubble">
          <div class="intent-badge error">❌ Error de conexión</div>
          <div>${escHtml(text)}</div>
        </div>
      </div>`);
    scrollBottom();
  }

  let typingCounter = 0;
  function appendTyping() {
    const id   = 'typing-' + (++typingCounter);
    const area = document.getElementById('chat-area');
    area.insertAdjacentHTML('beforeend', `
      <div class="msg maria" id="${id}">
        <div class="msg-avatar">🤖</div>
        <div class="bubble">
          <div class="typing"><span></span><span></span><span></span></div>
        </div>
      </div>`);
    scrollBottom();
    return id;
  }

  function removeTyping(id) {
    document.getElementById(id)?.remove();
  }

  function setLoading(val) {
    isLoading = val;
    document.getElementById('send-btn').disabled = val;
  }

  function scrollBottom() {
    const area = document.getElementById('chat-area');
    area.scrollTop = area.scrollHeight;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init ──────────────────────────────────────────────
  checkHealth();
  setInterval(checkHealth, 30000); // recheck every 30s
</script>
</body>
</html>
